    <main>
        <div class="overskrift">
             <h2>Kontakt Oss</h2>
        </div>

        <div class="kontakt-skjema">
            
            <form action="takk.html" method="get">
                
                <label for="navn">Navn:</label>
                <input type="text" id="navn" name="name" placeholder="Kari Norkvinne" required>

                <label for="epost">E-post:</label>
                <input type="email" id="epost" name="epost" placeholder="kjøp.noe.da@vi-trenger-penger.no" required>

                <label for="melding">Melding:</label>
                <textarea id="melding" rows="7" placeholder="Hva kan vi hjelpe deg med?" required></textarea>

                <button type="submit">Send</button>
            </form>
                
        </div>



    </main>

</body>
